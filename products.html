<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crochet Products</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #fff5f7;
    }

    h2 {
      text-align: center;
      padding: 20px;
      margin: 0;
      color: #333;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .item {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .item img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item h3 {
      margin: 10px 0 5px;
      font-size: 18px;
    }

    .item p {
      margin: 0;
      color: #666;
    }

    .order-button {
      display: block;
      margin: 25px auto;
      width: 200px;
      padding: 12px;
      background: #ffb6c1;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      color: black;
    }

    .order-button:hover {
      background: #ffa3b0;
    }
  </style>
</head>

<body>

  <h2>Our Crochet Products</h2>

  <div class="gallery">

    <div class="item">
      <img src="https://i.imgur.com/8pQeQ7C.jpeg" alt="Plushie">
      <h3>Plushies</h3>
      <p>Soft, cute, and customisable.</p>
    </div>

    <div class="item">
      <img src="https://i.imgur.com/0YgZp7q.jpeg" alt="Keychain">
      <h3>Keychains</h3>
      <p>Perfect for bags or keys.</p>
    </div>

    <div class="item">
      <img src="https://i.imgur.com/5m0y3tF.jpeg" alt="Scrunchie">
      <h3>Scrunchies</h3>
      <p>Pretty and gentle on hair.</p>
    </div>

    <div class="item">
      <img src="https://i.imgur.com/7hX8z6T.jpeg" alt="Bag">
      <h3>Bags</h3>
      <p>Handmade and stylish.</p>
    </div>

    <div class="item">
      <img src="https://i.imgur.com/3mV8p4H.jpeg" alt="Custom">
      <h3>Custom Orders</h3>
      <p>Your idea, handmade.</p>
    </div>

  </div>

  <a class="order-button" href="order.html">Place an Order</a>

</body>
</html>
