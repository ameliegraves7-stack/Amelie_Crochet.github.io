<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Amelie’s Crochet</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff5f7;
      margin: 0;
      padding: 0;
    }

    /* Header */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #ffb6c1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .nav-logo {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      text-decoration: none;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-size: 16px;
    }

    .nav-links a:hover {
      color: #000;
    }

    /* Homepage content */
    .home {
      text-align: center;
      padding: 40px;
    }

    .home h1 {
      font-size: 32px;
      color: #333;
    }

    .home p {
      font-size: 18px;
      color: #555;
      max-width: 600px;
      margin: 20px auto;
    }

    .home a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #ffb6c1;
      border-radius: 6px;
      text-decoration: none;
      color: black;
      font-size: 16px;
    }

    .home a:hover {
      background: #ffa3b0;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      background: #fff5f7;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="nav-logo">Amelie’s Crochet</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="order.html">Order</a>
      </div>
    </nav>
  </header>

  <!-- HOMEPAGE CONTENT -->
  <div class="home">
    <h1>Welcome to Amelie’s Crochet</h1>
    <p>Handmade crochet plushies, keychains, scrunchies, bags, and custom creations — made with love in New Zealand.</p>
    <a href="products.html">View Products</a>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Amelie’s Crochet — Handmade with love in NZ</p>
  </footer>

</body>
</html>
