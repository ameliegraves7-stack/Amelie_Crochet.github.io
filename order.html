<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crochet Order Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff5f7;
      margin: 0;
      padding: 0;
    }

    .order-form {
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .order-form h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .order-form label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #444;
    }

    .order-form input,
    .order-form select,
    .order-form textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .order-form button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: #ffb6c1;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .order-form button:hover {
      background: #ffa3b0;
    }
